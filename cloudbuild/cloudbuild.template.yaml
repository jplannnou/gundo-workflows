# ==============================================================================
# cloudbuild.template.yaml
# ------------------------------------------------------------------------------
# Standard Cloud Build pipeline for Gundo services. Consumers copy this to
# their repo as `cloudbuild.yaml` and tweak only the substitutions section at
# the bottom (or pass via `--substitutions` on submit).
#
# Used when a repo prefers Cloud Build over GitHub Actions for the image
# build (e.g. to leverage VPC connectors, Cloud SQL proxy, private peering).
# ==============================================================================

steps:
  # --------------------------------------------------------------------------
  # 1. Pull cache image (non-fatal)
  # --------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE}:latest || echo "No cache"

  # --------------------------------------------------------------------------
  # 2. Build image (multi-stage) with BuildKit
  # --------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    entrypoint: 'bash'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - '-c'
      - |
        docker build \
          --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE}:latest \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          ${_BUILD_ARGS} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE}:${SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE}:latest \
          -f ${_DOCKERFILE} \
          ${_BUILD_CONTEXT}
    waitFor: ['pull-cache']

  # --------------------------------------------------------------------------
  # 3. Push both tags
  # --------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE}'
    waitFor: ['build']

  # --------------------------------------------------------------------------
  # 4. Sign image with Cosign (keyless OIDC via Cloud Build SA)
  # --------------------------------------------------------------------------
  - name: 'ghcr.io/sigstore/cosign/cosign:v2.4.1'
    id: 'sign'
    entrypoint: 'cosign'
    env:
      - 'COSIGN_EXPERIMENTAL=1'
    args:
      - 'sign'
      - '--yes'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE}:${SHORT_SHA}'
    waitFor: ['push']

  # --------------------------------------------------------------------------
  # 5. Deploy to Cloud Run (no traffic, canary tag)
  # --------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy ${_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE}:${SHORT_SHA} \
          --region=${_REGION} \
          --service-account=${_RUNTIME_SA} \
          --memory=${_MEMORY} \
          --cpu=${_CPU} \
          --timeout=${_TIMEOUT} \
          --concurrency=${_CONCURRENCY} \
          --min-instances=${_MIN_INSTANCES} \
          --max-instances=${_MAX_INSTANCES} \
          --no-traffic \
          --tag=canary-${SHORT_SHA} \
          ${_DEPLOY_EXTRA_FLAGS}
    waitFor: ['sign']

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  dynamicSubstitutions: true

timeout: '1200s'

# ------------------------------------------------------------------------------
# Substitutions (override per-project in repo's cloudbuild.yaml or on submit)
# ------------------------------------------------------------------------------
substitutions:
  _REGION: 'us-central1'
  _ARTIFACT_REPO: 'gundo'
  _SERVICE: 'my-service'
  _DOCKERFILE: 'Dockerfile'
  _BUILD_CONTEXT: '.'
  _BUILD_ARGS: ''
  _RUNTIME_SA: ''
  _MEMORY: '1Gi'
  _CPU: '1'
  _TIMEOUT: '300'
  _CONCURRENCY: '80'
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '10'
  _DEPLOY_EXTRA_FLAGS: ''
